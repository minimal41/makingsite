<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かんたんサイトビルダー</title>
<style>
  :root{
    --shell-bg: #eeeeec;
    --panel-bg: #ffffff;
    --panel-bg-2: #f0f0ed;
    --line: #d6d6d2;
    --text: #0f0f0d;
    --text-dim: #6b6b64;
    --accent: #1642e0;
    --accent-dim: #dde6fb;
    --paper: #ffffff;
    --danger: #c8241a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--shell-bg);color:var(--text);}
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

  /* Top bar */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 18px;background:var(--panel-bg);border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:.01em;}
  .brand .dot{width:9px;height:9px;border-radius:2px;background:var(--accent);}
  .topbar-actions{display:flex;gap:8px;}
  button{
    font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel-bg-2);
    color:var(--text);border-radius:3px;padding:7px 13px;font-size:13px;
  }
  button:hover{border-color:var(--accent);color:var(--accent);}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
  button.primary:hover{background:#0f2fa8;border-color:#0f2fa8;color:#fff;}
  button.danger:hover{border-color:var(--danger);color:var(--danger);}
  button:disabled{opacity:.4;cursor:default;}
  button:disabled:hover{border-color:var(--line);color:var(--text);}

  /* Layout */
  .workspace{flex:1;display:flex;overflow:hidden;}

  .sidebar{
    width:220px;flex-shrink:0;background:var(--panel-bg);border-right:1px solid var(--line);
    padding:16px 14px;overflow-y:auto;
  }
  .sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin:0 0 10px;font-weight:800;}
  .block-btn{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    padding:9px 11px;margin-bottom:6px;background:var(--panel-bg);border:1px solid var(--line);
    border-radius:3px;font-size:13px;
  }
  .block-btn:hover{border-color:var(--accent);background:var(--panel-bg-2);}
  .block-btn:active{cursor:grabbing;}
  .block-btn{cursor:grab;}
  .block-btn.dragging{opacity:.4;}
  .block-btn .ico{
    min-width:20px;height:20px;padding:0 3px;border-radius:2px;background:var(--panel-bg-2);color:var(--text-dim);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;
  }
  .block-btn .drag-hint{margin-left:auto;color:var(--text-dim);font-size:11px;}

  .canvas-area{flex:1;overflow-y:auto;background:var(--shell-bg);padding:40px;display:flex;justify-content:center;align-items:flex-start;}

  .mobile-overlay{display:none;}
  .mobile-only-btn{display:none;}
  .panel-close-btn{display:none;}

  @media (max-width: 860px){
    .topbar{padding:10px 12px;flex-wrap:wrap;gap:8px;}
    .brand{font-size:13px;}
    .topbar-actions{gap:6px;flex-wrap:wrap;justify-content:flex-end;}
    .topbar-actions button{padding:6px 9px;font-size:12px;}

    .mobile-only-btn{display:inline-flex;}

    .workspace{position:relative;}
    .canvas-area{padding:16px;}

    .sidebar, .styles-panel{
      position:fixed;top:0;bottom:0;width:min(80vw, 260px);z-index:210;
      transition:transform .2s ease;box-shadow:0 0 24px rgba(0,0,0,.25);
    }
    .sidebar{left:0;transform:translateX(-100%);}
    .sidebar.mobile-open{transform:translateX(0);}
    .styles-panel{right:0;transform:translateX(100%);}
    .styles-panel.mobile-open{transform:translateX(0);}

    .mobile-overlay.show{
      display:block;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;
    }
    .panel-close-btn{
      display:inline-flex;align-items:center;justify-content:center;
      width:26px;height:26px;padding:0;margin-left:auto;font-size:15px;
      border-radius:3px;border:1px solid var(--line);background:var(--panel-bg-2);color:var(--text);
    }
    .sidebar h3:first-child, .styles-panel h3{display:flex;align-items:center;justify-content:space-between;}
  }
  .page{
    width:100%;min-height:600px;background:var(--paper);color:#000000;
    border:1px solid var(--line);padding:10px;
  }
  .page.drag-over{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}

  /* モバイルプレビュー: 実際の公開ページのレスポンシブ挙動をエディタ内で確認できるようにする */
  .page.mobile-preview{max-width:375px;}
  .page.mobile-preview #canvas > .element-wrap,
  .page.mobile-preview #headerArea,
  .page.mobile-preview #footerArea{
    display:block !important;width:100% !important;
    margin-left:0 !important;margin-right:0 !important;max-width:100% !important;
  }
  .page.mobile-preview .el-heading .content{font-size:24px !important;}
  .page.mobile-preview .el-subheading .content{font-size:17px !important;}
  .page.mobile-preview .el-paragraph .content{font-size:14px !important;}
  .page.mobile-preview .el-image .img-box{height:auto !important;aspect-ratio:16/9;}
  .page.mobile-preview #canvas{padding:6px;}
  #canvas{min-height:580px;padding:10px;position:relative;}
  #canvas:empty::before{
    content:"左のパーツをクリック、またはドラッグ＆ドロップしてページに追加してください";
    color:var(--text-dim);font-size:14px;display:block;padding:60px 20px;text-align:center;
  }
  .drop-indicator{
    height:2px;background:var(--accent);margin:2px 0;
  }

  .element-wrap{position:relative;margin:4px 0;border:1px solid transparent;border-radius:2px;display:block;width:100%;padding:5px;cursor:move;}
  .element-wrap .content{cursor:text;}
  .element-wrap .img-box, .element-wrap .img-box img{cursor:move;}
  .element-wrap.el-button{width:fit-content;max-width:100%;}
  .side-drop-indicator{
    position:absolute;width:2px;background:var(--accent);pointer-events:none;z-index:10;
  }
  .element-wrap:hover{border-color:var(--line);}
  .element-wrap.selected{border-color:var(--accent);}
  .element-toolbar{
    position:absolute;top:-13px;right:6px;display:none;gap:4px;z-index:5;
  }
  .element-wrap:hover .element-toolbar, .element-wrap.selected .element-toolbar{display:flex;}
  .element-toolbar button{
    padding:3px 7px;font-size:11px;border-radius:2px;background:#1c1b29;color:#fff;border:1px solid #1c1b29;
  }
  .element-toolbar button.danger{background:var(--danger);border-color:var(--danger);}

  .resize-handle{
    position:absolute;top:0;bottom:0;width:10px;
    cursor:ew-resize;z-index:6;display:none;
  }
  .resize-handle.right{right:0;}
  .resize-handle.left{left:0;}
  .element-wrap:hover .resize-handle,
  .element-wrap.selected .resize-handle{display:block;}
  .resize-handle::after{
    content:"";position:absolute;top:50%;transform:translateY(-50%);
    width:3px;height:28px;background:var(--accent);opacity:.9;
  }
  .resize-handle.right::after{right:2px;}
  .resize-handle.left::after{left:2px;}

  .resize-handle.bottom{
    top:auto;left:0;right:0;bottom:0;width:auto;height:10px;cursor:ns-resize;
  }
  .resize-handle.bottom::after{
    top:auto;bottom:2px;left:50%;transform:translateX(-50%);
    width:28px;height:3px;
  }

  .resize-handle.corner{
    top:auto;left:auto;right:auto;bottom:auto;width:14px;height:14px;
    border-radius:2px;background:var(--accent);border:2px solid #fff;
    box-shadow:0 0 0 1px var(--line);z-index:7;
  }
  .resize-handle.corner::after{content:none;}
  .resize-handle.corner.br{right:-6px;bottom:-6px;cursor:nwse-resize;}
  .resize-handle.corner.bl{left:-6px;bottom:-6px;cursor:nesw-resize;}

  .element-wrap[data-side-attached="true"] .resize-handle.left{display:none !important;}

  body.resizing-x, body.resizing-x *{cursor:ew-resize !important;user-select:none;}
  body.resizing-y, body.resizing-y *{cursor:ns-resize !important;user-select:none;}
  body.resizing-nwse, body.resizing-nwse *{cursor:nwse-resize !important;user-select:none;}
  body.resizing-nesw, body.resizing-nesw *{cursor:nesw-resize !important;user-select:none;}
  body.moving-x, body.moving-x *{cursor:move !important;user-select:none;}

  [data-el] .content{outline:none;padding:6px;border-radius:4px;}
  .el-heading .content:focus,
  .el-subheading .content:focus,
  .el-paragraph .content:focus{background:#fdf6ec;}

  .el-heading .content{font-size:32px;font-weight:800;padding:10px 6px;}
  .el-subheading .content{font-size:20px;font-weight:600;color:#5a5670;padding:6px;}
  .el-paragraph .content{font-size:15px;line-height:1.8;padding:8px 6px;}
  .el-button .content{
    display:inline-block;background:#1c1b29;color:#fff;padding:10px 22px;border-radius:8px;
    font-weight:700;font-size:14px;margin:6px;width:calc(100% - 12px);box-sizing:border-box;
  }
  .el-divider .content{border:none;border-top:2px solid #e7e3f0;margin:20px 0;height:0;border-radius:0;}
  .el-image{padding:6px;}
  .el-image .img-box{width:100%;height:280px;border-radius:8px;overflow:hidden;position:relative;}
  .el-image .img-box img{width:100%;height:100%;object-fit:cover;display:block;}
  .el-image .img-placeholder{
    background:#f1eef8;border:2px dashed #d3cce8;color:#9a91c2;border-radius:8px;
    padding:50px 10px;text-align:center;font-size:13px;cursor:pointer;
  }
  .el-section .content{background:#faf8f4;border-radius:10px;padding:24px;min-height:60px;}

  .element-wrap.dragging-part{
    position:relative;z-index:50;box-shadow:0 6px 16px rgba(0,0,0,.18);
    background:#fff;opacity:.97;cursor:grabbing;transition:none;
  }
  .header-footer-wrap{margin:0;padding:0;cursor:default;}
  #headerArea{border-bottom:1px solid #ececf2;margin-bottom:8px;}
  #headerArea .content{padding:16px 6px;font-size:20px;font-weight:700;}
  #footerArea{border-top:1px solid #ececf2;margin-top:8px;}
  #footerArea .content{padding:16px 6px;font-size:13px;color:#6b6b78;}

  /* Right style panel */
  .styles-panel{
    width:230px;flex-shrink:0;background:var(--panel-bg);border-left:1px solid var(--line);
    padding:16px 14px;overflow-y:auto;
  }
  .styles-panel h3{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin:0 0 12px;font-weight:800;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;}
  .field input[type=color]{width:100%;height:32px;border:1px solid var(--line);border-radius:3px;background:none;padding:2px;}
  .field select, .field input[type=text], .field input[type=number]{
    width:100%;padding:7px 8px;border-radius:3px;border:1px solid var(--line);background:var(--panel-bg);color:var(--text);font-size:13px;
  }
  .color-row{display:flex;gap:8px;align-items:center;}
  .color-row input[type=color]{flex:0 0 44px;width:44px;height:32px;padding:2px;border:1px solid var(--line);border-radius:3px;background:none;}
  .color-row input[type=text]{flex:1;font-family:monospace;text-transform:uppercase;min-width:0;}
  .crop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
  .crop-grid button{padding:8px 0;font-size:14px;}

  .fmt-btn{flex:1;}
  .fmt-btn.active{
    border-color:var(--accent);color:var(--accent);
    background:var(--accent-dim);
  }
  .align-row{display:flex;gap:6px;}
  .align-row button{flex:1;padding:6px;}
  .empty-hint{color:var(--text-dim);font-size:13px;line-height:1.6;}

  .page-settings{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line);}

  .bg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .bg-swatch{
    aspect-ratio:1;border-radius:2px;border:1px solid var(--line);cursor:pointer;padding:0;
    background-size:cover;background-position:center;position:relative;
  }
  .bg-swatch:hover{border-color:var(--accent);}
  .bg-swatch.active{outline:2px solid var(--accent);outline-offset:1px;}

  .el-embed .content{padding:6px;}
  .embed-code{
    width:100%;min-height:90px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;
    border:1px solid var(--line);border-radius:3px;padding:8px;resize:vertical;box-sizing:border-box;color:#1c1c1a;background:#fafafa;
  }
  .embed-actions{margin:6px 0;}
  .embed-actions button{padding:5px 10px;font-size:12px;border-radius:3px;border:1px solid #1c1c1a;background:#1c1c1a;color:#fff;}
  .embed-preview{border:1px dashed var(--line);border-radius:3px;padding:8px;min-height:10px;cursor:move;}
  .embed-preview:empty{display:none;}

  .el-table .content{padding:6px;cursor:move;overflow-x:auto;}
  .site-table{border-radius:0;}
  .site-table td, .site-table th{border-radius:0;}

  .table-modal-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;
    align-items:center;justify-content:center;padding:16px;
  }
  .table-modal-overlay.show{display:flex;}
  .table-modal{
    background:#fff;border-radius:4px;width:min(96vw, 1400px);height:92vh;
    display:flex;flex-direction:column;overflow:hidden;
  }
  .table-modal-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;border-bottom:1px solid var(--line);flex-shrink:0;
  }
  .table-modal-header h3{margin:0;font-size:14px;font-weight:800;}
  .table-modal-close-btn{
    display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
    width:28px;height:28px;padding:0;margin-left:12px;font-size:15px;
    border-radius:3px;border:1px solid var(--line);background:var(--panel-bg-2);color:var(--text);
  }
  .table-modal-close-btn:hover{border-color:var(--danger);color:var(--danger);}

  .table-mode-toolbar{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:10px 16px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--panel-bg-2);
  }
  .table-mode-toolbar .hint{font-size:12px;color:var(--text-dim);}

  .table-border-toolbar{
    display:none;align-items:center;gap:14px;flex-wrap:wrap;
    padding:10px 16px;border-bottom:1px solid var(--line);flex-shrink:0;background:#fdf6ec;
  }
  .table-border-toolbar.show{display:flex;}
  .table-border-toolbar .hint{font-size:12px;color:var(--text-dim);}
  .border-preset-grid{display:flex;gap:4px;padding:4px;background:var(--panel-bg);border:1px solid var(--line);border-radius:3px;}
  .border-preset-grid button{padding:6px 10px;font-size:12px;min-width:44px;}
  .table-border-toolbar label{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:4px;}
  .table-border-toolbar input[type=color]{width:32px;height:28px;padding:1px;border:1px solid var(--line);border-radius:3px;}
  .table-border-toolbar input[type=number]{width:56px;padding:5px 6px;border:1px solid var(--line);border-radius:3px;font-size:12px;}
  .table-border-toolbar select{padding:5px 6px;border:1px solid var(--line);border-radius:3px;font-size:12px;}

  .table-modal-scroll{
    position:relative;flex:1;overflow:auto;padding:16px 40px 40px 40px;
  }
  .table-modal-body{display:inline-block;margin-left:26px;margin-top:26px;outline:none;}
  .table-modal-body table{border-collapse:separate;border-spacing:0;}
  .table-modal-body td, .table-modal-body th{outline:none;min-width:70px;padding:8px 10px;}
  .table-modal-body td:focus, .table-modal-body th:focus{background:#fdf6ec;}
  .table-modal-body.select-mode td, .table-modal-body.select-mode th{cursor:cell;user-select:none;}
  .table-modal-body td.cell-selected, .table-modal-body th.cell-selected{
    background:rgba(22,66,224,.15);outline:1px solid var(--accent);outline-offset:-1px;
  }

  .table-row-ctrl, .table-col-ctrl, .table-add-row-btn, .table-add-col-btn{display:block;}
  .table-modal-scroll.select-mode-active .table-row-ctrl,
  .table-modal-scroll.select-mode-active .table-col-ctrl,
  .table-modal-scroll.select-mode-active .table-add-row-btn,
  .table-modal-scroll.select-mode-active .table-add-col-btn{display:none;}
  .table-row-ctrl, .table-col-ctrl{position:absolute;top:0;left:0;}
  .table-row-del-btn, .table-col-del-btn{
    position:absolute;display:flex;align-items:center;justify-content:center;
    background:var(--panel-bg-2);border:1px solid var(--line);color:var(--text-dim);
    font-size:10px;cursor:pointer;padding:0;border-radius:2px;
  }
  .table-row-del-btn{left:0;width:22px;}
  .table-col-del-btn{top:0;height:22px;}
  .table-row-del-btn:hover, .table-col-del-btn:hover{border-color:var(--danger);color:var(--danger);}

  .table-add-row-btn{
    position:absolute;padding:6px 18px;font-size:16px;font-weight:700;
    border-radius:3px;transform:translateX(-50%);
  }
  .table-add-col-btn{
    position:absolute;padding:10px 6px;font-size:16px;font-weight:700;
    border-radius:3px;transform:translateY(-50%);
  }

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#c7c7c2;border-radius:3px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span>かんたんサイトビルダー</div>
  <div class="topbar-actions">
    <button id="undoBtn" title="もとに戻す（Ctrl+Z）" disabled>↶</button>
    <button id="redoBtn" title="やり直す（Ctrl+Shift+Z）" disabled>↷</button>
    <button id="mobileSidebarBtn" class="mobile-only-btn" title="パーツ一覧を開く">☰ パーツ</button>
    <button id="mobileStylesBtn" class="mobile-only-btn" title="スタイルパネルを開く">🎨 スタイル</button>
    <button id="previewWidthBtn" title="モバイル表示で確認">📱 モバイルで見る</button>
    <a href="index.html" style="text-decoration:none;"><button type="button">サイト一覧を見る</button></a>
    <button id="clearBtn" class="danger">リセット</button>
    <button id="downloadBtn" class="primary">HTMLをダウンロード</button>
  </div>
</div>

<div class="workspace">
  <div class="mobile-overlay" id="mobileOverlay"></div>
  <div class="sidebar" id="sidebarPanel">
    <h3>パーツを追加<button type="button" class="panel-close-btn" id="sidebarCloseBtn">✕</button></h3>
    <button class="block-btn" draggable="true" data-add="heading"><span class="ico">H1</span>見出し<span class="drag-hint">⠿</span></button>
    <button class="block-btn" draggable="true" data-add="subheading"><span class="ico">H2</span>小見出し<span class="drag-hint">⠿</span></button>
    <button class="block-btn" draggable="true" data-add="paragraph"><span class="ico">¶</span>段落テキスト<span class="drag-hint">⠿</span></button>
    <button class="block-btn" draggable="true" data-add="image"><span class="ico">IMG</span>画像<span class="drag-hint">⠿</span></button>
    <button class="block-btn" draggable="true" data-add="button"><span class="ico">▭</span>ボタン<span class="drag-hint">⠿</span></button>
    <button class="block-btn" draggable="true" data-add="divider"><span class="ico">―</span>区切り線<span class="drag-hint">⠿</span></button>
    <button class="block-btn" draggable="true" data-add="section"><span class="ico">▢</span>セクション枠<span class="drag-hint">⠿</span></button>
    <button class="block-btn" draggable="true" data-add="embed"><span class="ico">&lt;/&gt;</span>HTML埋め込み<span class="drag-hint">⠿</span></button>
    <button class="block-btn" draggable="true" data-add="table"><span class="ico">▦</span>表<span class="drag-hint">⠿</span></button>

    <h3 style="margin-top:20px;">ページ設定</h3>
    <div class="page-settings" style="border-bottom:none;margin-bottom:0;padding-bottom:0;">
      <div class="field">
        <label>サイトタイトル</label>
        <input type="text" id="siteTitle" value="マイサイト">
      </div>
      <div class="field">
        <label>背景デザイン</label>
        <div class="bg-grid" id="bgGrid"></div>
      </div>
      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="headerToggle" style="width:auto;">
          ヘッダーを表示する
        </label>
      </div>
      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="footerToggle" style="width:auto;">
          フッターを表示する
        </label>
      </div>
      <div class="field">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="scrollTopToggle" style="width:auto;">
          「上に戻る」ボタンを右下に表示する
        </label>
      </div>
      <div class="field">
        <label>ボタンの色</label>
        <div class="color-row">
          <input type="color" id="scrollTopColor" value="#1c1b29">

<script>
const canvas = document.getElementById('canvas');
const pageEl = document.querySelector('.page');

const previewWidthBtn = document.getElementById('previewWidthBtn');
previewWidthBtn.addEventListener('click', ()=>{
  const isMobile = pageEl.classList.toggle('mobile-preview');
  previewWidthBtn.textContent = isMobile ? '🖥️ PCで見る' : '📱 モバイルで見る';
});
const stylesPanel = document.getElementById('stylesPanel');
const imgInput = document.getElementById('imgInput');

/* --- 表の編集モーダル --- */
const tableModalOverlay = document.getElementById('tableModalOverlay');
const tableModalScroll = document.getElementById('tableModalScroll');
const tableModalBody = document.getElementById('tableModalBody');
const tableModalCloseBtn = document.getElementById('tableModalCloseBtn');
const tableRowCtrl = document.getElementById('tableRowCtrl');
const tableColCtrl = document.getElementById('tableColCtrl');
const tableAddRowBtn = document.getElementById('tableAddRowBtn');
const tableAddColBtn = document.getElementById('tableAddColBtn');
const tableContentToolbar = document.getElementById('tableContentToolbar');
const tableBorderToolbar = document.getElementById('tableBorderToolbar');
const tableBorderModeBtn = document.getElementById('tableBorderModeBtn');
const tableContentModeBtn = document.getElementById('tableContentModeBtn');
const cellBorderColor = document.getElementById('cellBorderColor');
const cellBorderWidth = document.getElementById('cellBorderWidth');
const cellBorderStyle = document.getElementById('cellBorderStyle');
let tableModalWrap = null;
let tableJustDragged = false;
let borderEditMode = false;
let tableGrid = [];
let selAnchor = null;
let selFocus = null;
let isDraggingSelection = false;

function openTableModal(wrap){
  const table = wrap.querySelector('table');
  if(!table) return;
  tableModalWrap = wrap;
  const clone = table.cloneNode(true);
  clone.querySelectorAll('td, th').forEach(c => c.contentEditable = 'true');
  tableModalBody.innerHTML = '';
  tableModalBody.appendChild(clone);
  tableModalOverlay.classList.add('show');
  exitBorderEditMode();
  requestAnimationFrame(syncTableControls);
}

function closeTableModal(){
  if(!tableModalWrap) return;
  exitBorderEditMode();
  const editedTable = tableModalBody.querySelector('table');
  if(editedTable){
    editedTable.querySelectorAll('td, th').forEach(c => c.removeAttribute('contenteditable'));
    const content = tableModalWrap.querySelector('.content');
    const oldTable = content ? content.querySelector('table') : null;
    if(oldTable) oldTable.replaceWith(editedTable);
    else if(content) content.appendChild(editedTable);
  }
  tableModalBody.innerHTML = '';
  tableRowCtrl.innerHTML = '';
  tableColCtrl.innerHTML = '';
  tableModalWrap = null;
  tableModalOverlay.classList.remove('show');
  pushHistory();
}

tableModalCloseBtn.addEventListener('click', closeTableModal);
tableModalOverlay.addEventListener('mousedown', (e)=>{
  if(e.target === tableModalOverlay) closeTableModal();
});

/* 表・行・列に合わせて、行/列の削除ボタンと追加(＋)ボタンの位置を計算し直す */
function syncTableControls(){
  const table = tableModalBody.querySelector('table');
  tableRowCtrl.innerHTML = '';
  tableColCtrl.innerHTML = '';
  if(!table) return;

  const rows = [...table.querySelectorAll('tr')];
  if(!rows.length) return;
  const scrollRect = tableModalScroll.getBoundingClientRect();
  const scrollLeft = tableModalScroll.scrollLeft;
  const scrollTop = tableModalScroll.scrollTop;

  rows.forEach((tr, i)=>{
    const rect = tr.getBoundingClientRect();
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'table-row-del-btn';
    btn.textContent = '✕';
    btn.title = (i + 1) + '行目を削除';
    btn.style.top = (rect.top - scrollRect.top + scrollTop) + 'px';
    btn.style.height = rect.height + 'px';
    btn.addEventListener('click', ()=>{
      if(rows.length <= 1) return;
      tr.remove();
      syncTableControls();
    });
    tableRowCtrl.appendChild(btn);
  });

  const firstRowCells = [...rows[0].querySelectorAll('td, th')];
  firstRowCells.forEach((cell, colIndex)=>{
    const rect = cell.getBoundingClientRect();
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'table-col-del-btn';
    btn.textContent = '✕';
    btn.title = (colIndex + 1) + '列目を削除';
    btn.style.left = (rect.left - scrollRect.left + scrollLeft) + 'px';
    btn.style.width = rect.width + 'px';
    btn.addEventListener('click', ()=>{
      if(firstRowCells.length <= 1) return;
      rows.forEach(r=>{
        const cells = r.querySelectorAll('td, th');
        if(cells[colIndex]) cells[colIndex].remove();
      });
      syncTableControls();
    });
    tableColCtrl.appendChild(btn);
  });

  const tableRect = table.getBoundingClientRect();
  tableAddRowBtn.style.top = (tableRect.bottom - scrollRect.top + scrollTop + 10) + 'px';
  tableAddRowBtn.style.left = (tableRect.left - scrollRect.left + scrollLeft + tableRect.width / 2) + 'px';
  tableAddColBtn.style.left = (tableRect.right - scrollRect.left + scrollLeft + 10) + 'px';
  tableAddColBtn.style.top = (tableRect.top - scrollRect.top + scrollTop + tableRect.height / 2) + 'px';
}

tableAddRowBtn.addEventListener('click', ()=>{
  const table = tableModalBody.querySelector('table');
  if(!table) return;
  const rows = table.querySelectorAll('tr');
  const colCount = rows.length ? rows[0].querySelectorAll('td, th').length : 1;
  const tr = document.createElement('tr');
  for(let i = 0; i < colCount; i++){
    tr.insertAdjacentHTML('beforeend', tableCellHTML());
  }
  (table.querySelector('tbody') || table).appendChild(tr);
  tr.querySelectorAll('td, th').forEach(c => c.contentEditable = 'true');
  syncTableControls();
});

tableAddColBtn.addEventListener('click', ()=>{
  const table = tableModalBody.querySelector('table');
  if(!table) return;
  table.querySelectorAll('tr').forEach(tr=>{
    tr.insertAdjacentHTML('beforeend', tableCellHTML());
    const added = tr.lastElementChild;
    if(added) added.contentEditable = 'true';
  });
  syncTableControls();
});

/* 見出し・段落と同じく、プレースホルダーの「セル」はカーソルを入れると自動で消える */
tableModalBody.addEventListener('focusin', (e)=>{
  const cell = e.target.closest('td, th');
  if(!cell) return;
  if(cell.textContent === 'セル'){
    cell.textContent = '';
  }
});

tableModalBody.addEventListener('focusout', (e)=>{
  const cell = e.target.closest('td, th');
  if(!cell) return;
  if(cell.textContent.trim() === ''){
    cell.textContent = 'セル';
  }
});

/* Ctrl+Enterで次のマス、Ctrl+Shift+Enterで前のマスへ移動(内容編集モード) */
tableModalBody.addEventListener('keydown', (e)=>{
  if(borderEditMode) return;
  if(e.key !== 'Enter' || !e.ctrlKey) return;
  const cell = e.target.closest('td, th');
  if(!cell) return;
  e.preventDefault();
  const table = tableModalBody.querySelector('table');
  if(!table) return;
  const cells = [...table.querySelectorAll('td, th')];
  const idx = cells.indexOf(cell);
  if(idx === -1) return;
  const nextIdx = e.shiftKey ? idx - 1 : idx + 1;
  const target = cells[nextIdx];
  if(!target) return;
  target.focus();
  const range = document.createRange();
  range.selectNodeContents(target);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
});

/* ============ 枠線編集モード(Excelのようなセル選択+罫線プリセット) ============ */

function buildTableGrid(){
  const table = tableModalBody.querySelector('table');
  tableGrid = [];
  if(!table) return;
  table.querySelectorAll('tr').forEach(tr=>{
    tableGrid.push([...tr.querySelectorAll('td, th')]);
  });
}

function findCellPos(cell){
  for(let r = 0; r < tableGrid.length; r++){
    const c = tableGrid[r].indexOf(cell);
    if(c !== -1) return {row: r, col: c};
  }
  return null;
}

function clearSelectionHighlight(){
  tableModalBody.querySelectorAll('.cell-selected').forEach(c => c.classList.remove('cell-selected'));
}

function renderSelectionHighlight(){
  clearSelectionHighlight();
  if(!selAnchor || !selFocus) return;
  const r1 = Math.min(selAnchor.row, selFocus.row), r2 = Math.max(selAnchor.row, selFocus.row);
  const c1 = Math.min(selAnchor.col, selFocus.col), c2 = Math.max(selAnchor.col, selFocus.col);
  for(let r = r1; r <= r2; r++){
    for(let c = c1; c <= c2; c++){
      if(tableGrid[r] && tableGrid[r][c]) tableGrid[r][c].classList.add('cell-selected');
    }
  }
}

function enterBorderEditMode(){
  borderEditMode = true;
  buildTableGrid();
  tableModalBody.querySelectorAll('td, th').forEach(c => c.removeAttribute('contenteditable'));
  tableModalBody.classList.add('select-mode');
  tableModalScroll.classList.add('select-mode-active');
  tableContentToolbar.style.display = 'none';
  tableBorderToolbar.classList.add('show');
  if(tableGrid.length && tableGrid[0].length){
    selAnchor = {row: 0, col: 0};
    selFocus = {row: 0, col: 0};
    renderSelectionHighlight();
  }
  tableModalBody.focus();
}

function exitBorderEditMode(){
  borderEditMode = false;
  clearSelectionHighlight();
  selAnchor = null;
  selFocus = null;
  tableModalBody.querySelectorAll('td, th').forEach(c => c.contentEditable = 'true');
  tableModalBody.classList.remove('select-mode');
  tableModalScroll.classList.remove('select-mode-active');
  tableContentToolbar.style.display = 'flex';
  tableBorderToolbar.classList.remove('show');
}

tableBorderModeBtn.addEventListener('click', enterBorderEditMode);
tableContentModeBtn.addEventListener('click', exitBorderEditMode);

tableModalBody.addEventListener('mousedown', (e)=>{
  if(!borderEditMode) return;
  const cell = e.target.closest('td, th');
  if(!cell) return;
  e.preventDefault();
  const pos = findCellPos(cell);
  if(!pos) return;
  if(e.shiftKey && selAnchor){
    selFocus = pos;
  } else {
    selAnchor = pos;
    selFocus = pos;
  }
  isDraggingSelection = true;
  renderSelectionHighlight();
  tableModalBody.focus();
});

tableModalBody.addEventListener('mousemove', (e)=>{
  if(!borderEditMode || !isDraggingSelection) return;
  const cell = e.target.closest('td, th');
  if(!cell) return;
  const pos = findCellPos(cell);
  if(!pos) return;
  selFocus = pos;
  renderSelectionHighlight();
});

document.addEventListener('mouseup', ()=>{
  isDraggingSelection = false;
});

tableModalBody.addEventListener('keydown', (e)=>{
  if(!borderEditMode) return;

  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a'){
    e.preventDefault();
    if(tableGrid.length && tableGrid[0].length){
      selAnchor = {row: 0, col: 0};
      selFocus = {row: tableGrid.length - 1, col: tableGrid[0].length - 1};
      renderSelectionHighlight();
    }
    return;
  }

  const arrowMap = {ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1]};
  if(arrowMap[e.key] && selFocus && tableGrid.length){
    e.preventDefault();
    const [dr, dc] = arrowMap[e.key];
    const newRow = Math.max(0, Math.min(tableGrid.length - 1, selFocus.row + dr));
    const newCol = Math.max(0, Math.min(tableGrid[0].length - 1, selFocus.col + dc));
    selFocus = {row: newRow, col: newCol};
    if(!e.shiftKey){
      selAnchor = selFocus;
    }
    renderSelectionHighlight();
  }
});

function wavyBorderImageValue(color){
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="10"><path d="M0 5 Q5 0 10 5 T20 5" fill="none" stroke="${color}" stroke-width="2"/></svg>`;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
}

/* Excelの罫線ボタンのように、選択範囲に対して「全て/外枠/内側/上/下/左/右/なし」を適用する */
function applyPresetBorder(preset){
  if(!selAnchor || !selFocus) return;
  const r1 = Math.min(selAnchor.row, selFocus.row), r2 = Math.max(selAnchor.row, selFocus.row);
  const c1 = Math.min(selAnchor.col, selFocus.col), c2 = Math.max(selAnchor.col, selFocus.col);

  const color = cellBorderColor.value;
  let width = parseInt(cellBorderWidth.value, 10);
  if(!Number.isFinite(width) || width < 1) width = 1;
  const style = cellBorderStyle.value;
  if(style === 'double' && width < 3){
    width = 3;
    cellBorderWidth.value = width;
  }

  const allSides = ['top', 'right', 'bottom', 'left'];

  for(let r = r1; r <= r2; r++){
    for(let c = c1; c <= c2; c++){
      const cell = tableGrid[r] && tableGrid[r][c];
      if(!cell) continue;

      const isTop = r === r1, isBottom = r === r2, isLeft = c === c1, isRight = c === c2;
      let sides = [];
      if(preset === 'all' || preset === 'none'){
        sides = allSides.slice();
      } else if(preset === 'outer'){
        if(isTop) sides.push('top');
        if(isBottom) sides.push('bottom');
        if(isLeft) sides.push('left');
        if(isRight) sides.push('right');
      } else if(preset === 'inner'){
        if(!isTop) sides.push('top');
        if(!isBottom) sides.push('bottom');
        if(!isLeft) sides.push('left');
        if(!isRight) sides.push('right');
      } else if(preset === 'innerH'){
        if(!isTop) sides.push('top');
        if(!isBottom) sides.push('bottom');
      } else if(preset === 'innerV'){
        if(!isLeft) sides.push('left');
        if(!isRight) sides.push('right');
      } else if(preset === 'top' && isTop){
        sides.push('top');
      } else if(preset === 'bottom' && isBottom){
        sides.push('bottom');
      } else if(preset === 'left' && isLeft){
        sides.push('left');
      } else if(preset === 'right' && isRight){
        sides.push('right');
      }
      if(sides.length === 0) continue;

      if(preset === 'none'){
        sides.forEach(side=>{
          const Side = side.charAt(0).toUpperCase() + side.slice(1);
          cell.style['border' + Side + 'Style'] = 'none';
          cell.style['border' + Side + 'Width'] = '0px';
        });
        cell.style.borderImageSource = 'none';
        continue;
      }

      if(style === 'wavy'){
        allSides.forEach(side=>{
          const Side = side.charAt(0).toUpperCase() + side.slice(1);
          if(sides.includes(side)){
            cell.style['border' + Side + 'Style'] = 'solid';
            cell.style['border' + Side + 'Width'] = Math.max(width, 4) + 'px';
            cell.style['border' + Side + 'Color'] = color;
          }
        });
        cell.style.borderImageSource = wavyBorderImageValue(color);
        cell.style.borderImageSlice = '50%';
        cell.style.borderImageRepeat = 'round';
        cell.style.borderImageWidth = allSides.map(s => sides.includes(s) ? '1' : '0').join(' ');
      } else {
        cell.style.borderImageSource = 'none';
        sides.forEach(side=>{
          const Side = side.charAt(0).toUpperCase() + side.slice(1);
          cell.style['border' + Side + 'Style'] = style;
          cell.style['border' + Side + 'Width'] = width + 'px';
          cell.style['border' + Side + 'Color'] = color;
        });
      }
    }
  }
}

document.querySelectorAll('.border-preset-grid button').forEach(btn=>{
  btn.addEventListener('click', ()=> applyPresetBorder(btn.dataset.preset));
  btn.addEventListener('mousedown', (e)=> e.preventDefault());
});


/* --- スマホ表示: サイドバー・スタイルパネルの開閉 --- */
const sidebarPanel = document.getElementById('sidebarPanel');
const mobileOverlay = document.getElementById('mobileOverlay');
const mobileSidebarBtn = document.getElementById('mobileSidebarBtn');
const mobileStylesBtn = document.getElementById('mobileStylesBtn');

stylesPanel.addEventListener('click', (e)=>{

});

let selected = null;
let savedRange = null;
let savedRangeContent = null;

document.addEventListener('selectionchange', ()=>{
  const sel = window.getSelection();
  if(!sel || sel.rangeCount === 0) return;
  const range = sel.getRangeAt(0);
  const node = range.commonAncestorContainer;
  const el = node.nodeType === 3 ? node.parentElement : node;
  const contentEl = el ? el.closest('.content[contenteditable="true"]') : null;
  if(contentEl && pageEl.contains(contentEl)){
    if(!range.collapsed){
      savedRange = range.cloneRange();
      savedRangeContent = contentEl;
    } else {
      savedRange = null;
      savedRangeContent = null;
    }
  }
  if(typeof updateFormatButtonStates === 'function') updateFormatButtonStates();
});
let currentBgCSS = '#ffffff';
let scrollTopEnabled = false;
let scrollTopColor = '#1c1b29';
let headerEnabled = false;
let footerEnabled = false;

const headerArea = document.getElementById('headerArea');
const footerArea = document.getElementById('footerArea');

document.getElementById('siteTitle').addEventListener('input', ()=> pushHistoryDebounced());

document.getElementById('headerToggle').addEventListener('change', (e)=>{
  headerEnabled = e.target.checked;
  headerArea.style.display = headerEnabled ? '' : 'none';
  pushHistory();
});
document.getElementById('footerToggle').addEventListener('change', (e)=>{
  footerEnabled = e.target.checked;
  footerArea.style.display = footerEnabled ? '' : 'none';
  pushHistory();
});

document.getElementById('scrollTopToggle').addEventListener('change', (e)=>{
  scrollTopEnabled = e.target.checked;
  pushHistory();
});
document.getElementById('scrollTopColor').addEventListener('input', (e)=>{
  scrollTopColor = e.target.value;
  document.getElementById('scrollTopColorText').value = e.target.value;
  pushHistoryDebounced();
});
document.getElementById('scrollTopColorText').addEventListener('input', (e)=>{
  let v = e.target.value.trim();
  if(v && !v.startsWith('#')) v = '#' + v;
  if(/^#[0-9a-fA-F]{6}$/.test(v)){
    scrollTopColor = v;
    document.getElementById('scrollTopColor').value = v;
    pushHistoryDebounced();
  }
});

/* ---------- Undo / Redo history ---------- */
let history = [];
let historyIndex = -1;
let isRestoring = false;
let historyDebounceTimer = null;

function captureSnapshot(){
  return {
    canvas: canvas.innerHTML,
    header: headerArea.querySelector('.content').innerHTML,
    footer: footerArea.querySelector('.content').innerHTML,
    headerEnabled: headerEnabled,
    footerEnabled: footerEnabled,
    currentBgCSS: currentBgCSS,
    scrollTopEnabled: scrollTopEnabled,
    scrollTopColor: scrollTopColor,
    siteTitle: document.getElementById('siteTitle').value
  };
}

function pushHistory(){
  if(isRestoring) return;
  clearTimeout(historyDebounceTimer);
  const snap = captureSnapshot();
  const last = history[historyIndex];
  if(last && JSON.stringify(last) === JSON.stringify(snap)) return;
  history = history.slice(0, historyIndex + 1);
  history.push(snap);
  historyIndex++;
  updateUndoRedoButtons();
}

function pushHistoryDebounced(){
  if(isRestoring) return;
  clearTimeout(historyDebounceTimer);
  historyDebounceTimer = setTimeout(()=> pushHistory(), 500);
}

function restoreSnapshot(snap){
  isRestoring = true;

  document.querySelectorAll('.element-wrap.selected').forEach(w=>w.classList.remove('selected'));
  selected = null;
  savedRange = null;
  savedRangeContent = null;

  canvas.innerHTML = snap.canvas;
  headerArea.querySelector('.content').innerHTML = snap.header;
  footerArea.querySelector('.content').innerHTML = snap.footer;

  headerEnabled = snap.headerEnabled;
  footerEnabled = snap.footerEnabled;
  headerArea.style.display = headerEnabled ? '' : 'none';
  footerArea.style.display = footerEnabled ? '' : 'none';
  document.getElementById('headerToggle').checked = headerEnabled;
  document.getElementById('footerToggle').checked = footerEnabled;

  currentBgCSS = snap.currentBgCSS;
  pageEl.style.background = currentBgCSS;
  if(typeof renderBgGrid === 'function') renderBgGrid();

  scrollTopEnabled = snap.scrollTopEnabled;
  scrollTopColor = snap.scrollTopColor;
  document.getElementById('scrollTopToggle').checked = scrollTopEnabled;
  document.getElementById('scrollTopColor').value = scrollTopColor;
  document.getElementById('scrollTopColorText').value = scrollTopColor;

  document.getElementById('siteTitle').value = snap.siteTitle;

  renderStylesPanel();
  isRestoring = false;
  updateUndoRedoButtons();
}

function undo(){
  if(historyIndex <= 0) return;
  historyIndex--;
  restoreSnapshot(history[historyIndex]);
}

function redo(){
  if(historyIndex >= history.length - 1) return;
  historyIndex++;
  restoreSnapshot(history[historyIndex]);
}

function updateUndoRedoButtons(){
  const undoBtn = document.getElementById('undoBtn');
  const redoBtn = document.getElementById('redoBtn');
  if(undoBtn) undoBtn.disabled = historyIndex <= 0;
  if(redoBtn) redoBtn.disabled = historyIndex >= history.length - 1;
}

document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);

document.addEventListener('keydown', (e)=>{
  const key = e.key.toLowerCase();
  if((e.ctrlKey || e.metaKey) && key === 'z' && e.shiftKey){
    e.preventDefault();
    redo();
  } else if((e.ctrlKey || e.metaKey) && key === 'z'){
    e.preventDefault();
    undo();
  }
});

const defaultTexts = {

  subheading: '小見出しテキスト',

function attachHandles(wrap, type){
  const toolbar = document.createElement('div');
  toolbar.className = 'element-toolbar';
  toolbar.innerHTML = `
    <button data-act="dup" title="複製">⧉</button>
    <button data-act="del" class="danger" title="削除">✕</button>
  `;
  wrap.appendChild(toolbar);

  const resizeHandleLeft = document.createElement('div');
  resizeHandleLeft.className = 'resize-handle left';
  resizeHandleLeft.title = 'ドラッグして幅を変更（左端）';
  wrap.appendChild(resizeHandleLeft);

  const resizeHandleRight = document.createElement('div');
  resizeHandleRight.className = 'resize-handle right';
  resizeHandleRight.title = 'ドラッグして幅を変更（右端）';
  wrap.appendChild(resizeHandleRight);

  if(type === 'image'){
    const resizeHandleBottom = document.createElement('div');
    resizeHandleBottom.className = 'resize-handle bottom';
    resizeHandleBottom.title = 'ドラッグして高さを変更（トリミング）';
    wrap.appendChild(resizeHandleBottom);

    const cornerBR = document.createElement('div');
    cornerBR.className = 'resize-handle corner br';
    cornerBR.title = 'ドラッグして拡大・縮小（縦横比を保持）';
    wrap.appendChild(cornerBR);

    const cornerBL = document.createElement('div');
    cornerBL.className = 'resize-handle corner bl';
    cornerBL.title = 'ドラッグして拡大・縮小（縦横比を保持）';

function createBlock(type){
  idCounter++;
  const wrap = document.createElement('div');
  wrap.className = 'element-wrap el-' + type;
  wrap.dataset.el = type;
  wrap.dataset.id = 'el-' + idCounter;

  wrap.innerHTML = templates[type]();
  attachHandles(wrap, type);

  return wrap;
}

/* 見出し・小見出し・段落・ボタンを追加した直後は、すぐ打ち直せるように
   自動でテキストにカーソルを入れる(プレースホルダーの文字を全選択しておく)。 */
function focusNewContent(wrap, type){
  if(!['heading', 'subheading', 'paragraph', 'button'].includes(type)) return;
  const content = wrap.querySelector('.content');
  if(!content) return;
  content.focus();
  const range = document.createRange();
  range.selectNodeContents(content);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function addBlock(type){
  const wrap = createBlock(type);
  canvas.appendChild(wrap);
  selectElement(wrap);
  closeMobilePanels();
  focusNewContent(wrap, type);
  pushHistory();
}

function insertBlockAt(type, refNode){
  const wrap = createBlock(type);
  if(refNode) canvas.insertBefore(wrap, refNode);
  else canvas.appendChild(wrap);
  selectElement(wrap);
  focusNewContent(wrap, type);
  pushHistory();
}

document.querySelectorAll('[data-add]').forEach(btn=>{
  btn.addEventListener('click', ()=> addBlock(btn.dataset.add));

  btn.addEventListener('dragstart', (e)=>{
    e.dataTransfer.setData('text/plain', btn.dataset.add);
    e.dataTransfer.effectAllowed = 'copy';
    btn.classList.add('dragging');
  });
  btn.addEventListener('dragend', ()=>{
    btn.classList.remove('dragging');
    pageEl.classList.remove('drag-over');
    if(dropIndicator && dropIndicator.parentNode){
      dropIndicator.parentNode.removeChild(dropIndicator);
    }
    hideSideIndicator();
    pendingSideDrop = null;
  });
});

pageEl.addEventListener('click', (e)=>{
  const wrap = e.target.closest('.element-wrap');
  if(!wrap) return;

  const actBtn = e.target.closest('[data-act]');
  if(actBtn){
    e.stopPropagation();
    handleAction(wrap, actBtn.dataset.act);
    return;
  }

  if(e.target.classList.contains('img-placeholder')){
    pendingImageWrap = wrap;
    imgInput.click();
    return;
  }

  if(e.target.classList.contains('embed-apply')){
    e.stopPropagation();
    const textarea = wrap.querySelector('.embed-code');
    const preview = wrap.querySelector('.embed-preview');
    if(textarea && preview) runEmbedPreview(preview, textarea.value);
    return;
  }

  selectElement(wrap);

  if(wrap.dataset.el === 'table' && e.target.closest('.content') && !tableJustDragged){
    openTableModal(wrap);
  }
  tableJustDragged = false;
});

function runEmbedPreview(container, code){
  container.innerHTML = code;
  container.querySelectorAll('script').forEach(oldScript=>{
    const newScript = document.createElement('script');
    for(const attr of oldScript.attributes){ newScript.setAttribute(attr.name, attr.value); }
    newScript.textContent = oldScript.textContent;
    oldScript.parentNode.replaceChild(newScript, oldScript);
  });
}

pageEl.addEventListener('focusin', (e)=>{
  if(!e.target.classList.contains('content')) return;
  const wrap = e.target.closest('.element-wrap');
  if(!wrap) return;
  const type = wrap.dataset.el;
  const def = defaultTexts[type];
  if(def && e.target.textContent === def){
    e.target.textContent = '';
  }
});

pageEl.addEventListener('focusout', (e)=>{
  if(!e.target.classList.contains('content')) return;
  const wrap = e.target.closest('.element-wrap');
  if(!wrap) return;
  const type = wrap.dataset.el;
  const def = defaultTexts[type];
  if(def && e.target.textContent.trim() === ''){
    e.target.textContent = def;
  }
  pushHistory();
});

pageEl.addEventListener('input', (e)=>{
  if(!e.target.classList || !e.target.classList.contains('content')) return;
  if(e.target.getAttribute('contenteditable') !== 'true') return;
  pushHistoryDebounced();
});

imgInput.addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file || !pendingImageWrap) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const wrap = pendingImageWrap;
    wrap.innerHTML = `<div class="img-box"><img src="${ev.target.result}" alt="画像"></div>`;
    attachHandles(wrap, 'image');
    selectElement(wrap);

    const tempImg = new Image();
    tempImg.onload = ()=>{
      const imgBox = wrap.querySelector('.img-box');
      if(!imgBox || !tempImg.naturalWidth || !tempImg.naturalHeight) return;
      const boxWidth = imgBox.getBoundingClientRect().width;
      const ratio = tempImg.naturalHeight / tempImg.naturalWidth;
      imgBox.style.height = Math.round(boxWidth * ratio) + 'px';
      pushHistory();
    };
    tempImg.src = ev.target.result;
    pushHistory();
  };
  reader.readAsDataURL(file);
  imgInput.value = '';
});

function handleAction(wrap, act){
  if(act === 'del'){
    if(selected === wrap){ selected = null; renderStylesPanel(); }
    wrap.remove();
    pushHistory();
    return;
  }
  if(act === 'dup'){
    const clone = wrap.cloneNode(true);
    clone.dataset.id = 'el-' + (++idCounter);
    wrap.after(clone);
    selectElement(clone);
    pushHistory();
    return;
  }
}

function selectElement(wrap){
  document.querySelectorAll('.element-wrap.selected').forEach(w=>w.classList.remove('selected'));
  wrap.classList.add('selected');
  selected = wrap;
  if(!(savedRangeContent && wrap.contains(savedRangeContent))){
    savedRange = null;
    savedRangeContent = null;
  }
  renderStylesPanel();
}

const loadedFontValues = new Set();

function fontCssStack(font){
  return `"${font.family}", ${font.fallback}`;
}

function ensureFontLoaded(font){
  if(!font || loadedFontValues.has(font.value)) return;
  loadedFontValues.add(font.value);
  const encodedFamily = font.family.split(' ').join('+');
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = `https://fonts.googleapis.com/css2?family=${encodedFamily}:wght@400;700&display=swap`;
  document.head.appendChild(link);
}

function buildFontOptions(currentValue){
  let html = `<option value=""${currentValue ? '' : ' selected'}>デフォルト</option>`;
  let currentGroup = null;
  googleFonts.forEach(f=>{
    if(f.group !== currentGroup){
      if(currentGroup !== null) html += `</optgroup>`;
      html += `<optgroup label="${f.group}">`;
      currentGroup = f.group;
    }
    html += `<option value="${f.value}"${f.value === currentValue ? ' selected' : ''}>${f.label}</option>`;
  });
  if(currentGroup !== null) html += `</optgroup>`;
  return html;
}

function currentFontValue(content){
  if(!content) return '';
  const ff = content.style.fontFamily || '';
  if(!ff) return '';
  const match = googleFonts.find(f => ff.includes(f.family));
  return match ? match.value : '';
}

function collectUsedGoogleFonts(){
  const used = new Map();
  const contents = [
    ...canvas.querySelectorAll(':scope > .element-wrap .content'),
    headerArea.querySelector('.content'),
    footerArea.querySelector('.content')
  ];
  contents.forEach(c=>{
    if(!c) return;
    const value = currentFontValue(c);
    if(!value) return;
    const font = googleFonts.find(f=>f.value === value);
    if(font) used.set(font.value, font);
  });
  return [...used.values()];
}

function buildGoogleFontsHeadTags(){
  const used = collectUsedGoogleFonts();
  if(used.length === 0) return '';
  const params = used.map(f => `family=${f.family.split(' ').join('+')}:wght@400;700`).join('&');
  return `<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?${params}&display=swap" rel="stylesheet">
`;
}

  const type = selected.dataset.el;
  const content = selected.querySelector('.content, img');
  const cs = content ? getComputedStyle(content) : null;

  let html = `<h3>スタイル（${labelFor(type)}）<button type="button" class="panel-close-btn" id="stylesCloseBtn">✕</button></h3>`;

    html += `<div class="empty-hint" style="margin-bottom:14px;">幅は、パーツにマウスを乗せたときに出る左右の取っ手をドラッグして調整できます。位置の移動は、パーツの枠（余白部分）をドラッグしてください。</div>`;

    html += `<div class="empty-hint" style="margin-bottom:14px;">ヘッダー・フッターは常にページの幅いっぱいに表示されます。</div>`;

function toggleFormat(kind){
  if(!selected) return;
  const content = selected.querySelector('.content');
  if(!content) return;
  const hasPartialSelection = !!(savedRange && !savedRange.collapsed && savedRangeContent && selected.contains(savedRangeContent));

  if(hasPartialSelection){
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
    document.execCommand(kind);
    if(sel.rangeCount) savedRange = sel.getRangeAt(0).cloneRange();
  } else if(kind === 'bold'){
    content.style.fontWeight = (content.style.fontWeight === 'bold') ? '' : 'bold';
  } else if(kind === 'underline'){
    const isUnderlined = content.style.textDecoration.indexOf('underline') !== -1;
    content.style.textDecoration = isUnderlined ? 'none' : 'underline';
  }

  pushHistory();
  updateFormatButtonStates();
}

function updateFormatButtonStates(){
  const boldBtn = document.getElementById('boldToggleBtn');
  const underlineBtn = document.getElementById('underlineToggleBtn');
  if(!boldBtn && !underlineBtn) return;

  const hasPartialSelection = !!(savedRange && !savedRange.collapsed && savedRangeContent && selected && selected.contains(savedRangeContent));
  let bold = false, underline = false;

  if(hasPartialSelection){
    try{ bold = document.queryCommandState('bold'); }catch(e){ bold = false; }
    try{ underline = document.queryCommandState('underline'); }catch(e){ underline = false; }
  } else if(selected){
    const content = selected.querySelector('.content');
    if(content){
      bold = content.style.fontWeight === 'bold';
      underline = content.style.textDecoration.indexOf('underline') !== -1;
    }
  }

  if(boldBtn) boldBtn.classList.toggle('active', bold);
  if(underlineBtn) underlineBtn.classList.toggle('active', underline);
}

function applySelectionCommand(command, value){
  if(!savedRange || !selected || !selected.contains(savedRangeContent)) return false;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(savedRange);
  document.execCommand(command, false, value === undefined ? null : value);
  if(sel.rangeCount){
    savedRange = sel.getRangeAt(0).cloneRange();
  }
  return true;
}

/* 部分選択への文字サイズ/フォント適用は、以前はexecCommand('fontSize'/'fontName')と
   目印用のfont[size="7"]タグを使っていたが、既存の別の場所に残っていた同じ目印のタグまで
   まとめて書き換えてしまうことがあり、これが「サイズの桁を消すと選択箇所より右が
   見えなくなる（極端に小さくなる）」バグの原因だった。
   ここでは選択範囲(Range)を直接操作して確実にその範囲だけを<span>で囲む方式にする。
   同じ操作を続けてタイプしたときは、直前に作ったspanを目印(data-live-edit)で見つけて
   再利用し、二重三重に入れ子のspanができないようにする。 */
function getReusableInlineSpan(kind){
  if(!savedRange || savedRange.collapsed) return null;
  let node = savedRange.startContainer;
  node = node.nodeType === 3 ? node.parentElement : node;
  const span = node && node.closest ? node.closest(`span[data-live-edit="${kind}"]`) : null;
  if(!span) return null;
  const full = document.createRange();
  full.selectNodeContents(span);
  if(savedRange.compareBoundaryPoints(Range.START_TO_START, full) === 0 &&
     savedRange.compareBoundaryPoints(Range.END_TO_END, full) === 0){
    return span;
  }
  return null;
}

function getOrCreateInlineSpan(kind){
  const existing = getReusableInlineSpan(kind);
  if(existing) return existing;

  const range = savedRange.cloneRange();
  const span = document.createElement('span');
  span.dataset.liveEdit = kind;
  span.appendChild(range.extractContents());
  range.insertNode(span);

  const newRange = document.createRange();
  newRange.selectNodeContents(span);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(newRange);
  savedRange = newRange.cloneRange();
  savedRangeContent = selected.querySelector('.content');
  return span;
}

function applyStyle(kind, val, sourceEl){
  if(!selected) return;

  if(kind === 'objpos'){
    const img = selected.querySelector('.img-box img');
    if(img) img.style.objectPosition = val;
    pushHistory();
    return;
  }

  const hasPartialSelection = !!(savedRange && !savedRange.collapsed && savedRangeContent && selected.contains(savedRangeContent));

  if(hasPartialSelection){
    if(kind === 'color'){ applySelectionCommand('foreColor', val); if(sourceEl) sourceEl.focus(); pushHistoryDebounced(); return; }
    if(kind === 'bg'){ applySelectionCommand('backColor', val); if(sourceEl) sourceEl.focus(); pushHistoryDebounced(); return; }
    if(kind === 'align'){
      const span = getOrCreateInlineSpan('align');
      span.style.display = 'block';
      span.style.textAlign = val;
      if(sourceEl) sourceEl.focus();
      pushHistory();
      return;
    }
    if(kind === 'size'){
      const caretPos = (sourceEl && typeof sourceEl.selectionStart === 'number') ? sourceEl.selectionStart : null;
      const span = getOrCreateInlineSpan('size');
      span.style.fontSize = val;
      if(sourceEl){
        sourceEl.focus();
        if(caretPos !== null && sourceEl.setSelectionRange){
          try{ sourceEl.setSelectionRange(caretPos, caretPos); }catch(e){}
        }
      }
      pushHistoryDebounced();
      return;
    }
    if(kind === 'font'){
      const font = googleFonts.find(f => f.value === val);
      const span = getOrCreateInlineSpan('font');
      if(font){
        ensureFontLoaded(font);
        span.style.fontFamily = fontCssStack(font);
      } else {
        span.style.fontFamily = '';
      }
      if(sourceEl) sourceEl.focus();
      pushHistoryDebounced();
      return;
    }
  }

  const content = selected.querySelector('.content');
  if(!content) return;
  if(kind === 'align'){ content.style.textAlign = val; pushHistory(); return; }
  if(kind === 'color'){ content.style.color = val; pushHistoryDebounced(); return; }
  if(kind === 'bg'){ content.style.background = val; pushHistoryDebounced(); return; }
  if(kind === 'size'){ content.style.fontSize = val; pushHistoryDebounced(); return; }
  if(kind === 'dividerColor'){ content.style.borderTopColor = val; pushHistoryDebounced(); return; }
  if(kind === 'dividerWidth'){ content.style.borderTopWidth = val + 'px'; pushHistoryDebounced(); return; }
  if(kind === 'tableOuterColor' || kind === 'tableOuterWidth'){
    const table = content.querySelector('table');
    if(table){
      if(kind === 'tableOuterColor') table.style.borderColor = val;
      else table.style.borderWidth = val + 'px';
    }
    pushHistoryDebounced();
    return;
  }
  if(kind === 'tableInnerColor' || kind === 'tableInnerWidth'){
    const cells = content.querySelectorAll('td, th');
    cells.forEach(c=>{
      if(kind === 'tableInnerColor') c.style.borderColor = val;
      else c.style.borderWidth = val + 'px';
    });
    pushHistoryDebounced();
    return;
  }
  if(kind === 'font'){
    const font = googleFonts.find(f => f.value === val);
    if(font){
      ensureFontLoaded(font);
      content.style.fontFamily = fontCssStack(font);
    } else {
      content.style.fontFamily = '';
    }
    pushHistory();
    return;
  }
}

function rgbToHex(rgb){
  if(!rgb || rgb.indexOf('rgb') === -1) return '#000000';
  const nums = rgb.match(/\d+/g).map(Number);
  return '#' + nums.slice(0,3).map(n=>n.toString(16).padStart(2,'0')).join('');
}

function getIndicator(){
  if(!dropIndicator){
    dropIndicator = document.createElement('div');
    dropIndicator.className = 'drop-indicator';
  }
  return dropIndicator;
}

function findDropTarget(clientY){
  const wraps = [...canvas.querySelectorAll(':scope > .element-wrap')];
  for(const w of wraps){
    const rect = w.getBoundingClientRect();
    if(clientY < rect.top + rect.height / 2){
      return w;
    }
  }
  return null;
}

/* 幅・位置(%)の基準は「canvasのpaddingを除いた内側の幅」でなければならない。
   canvas.getBoundingClientRect().width（padding込み）をそのまま基準にすると、
   幅を変えるたびに実際の描画位置とJS側の計算がわずかにズレていく原因になっていた。 */
function getCanvasContentBox(){
  const rect = canvas.getBoundingClientRect();
  const cs = getComputedStyle(canvas);
  const padLeft = parseFloat(cs.paddingLeft) || 0;
  const padRight = parseFloat(cs.paddingRight) || 0;
  return {
    left: rect.left + padLeft,
    right: rect.right - padRight,
    width: rect.width - padLeft - padRight
  };
}

/* 幅を縮めたパーツの右側に余ったスペースがあるかを判定し、
   あればそこに新しいパーツを横並びで入れられるようにする（ドラッグ追加時のみ）。 */
const SIDE_DROP_MIN_GAP = 60; // これ以上の余白があれば横並び対象にする

function findSideDropTarget(clientX, clientY, excludeEl){
  const box = getCanvasContentBox();
  const wraps = [...canvas.querySelectorAll(':scope > .element-wrap')].filter(w => w !== excludeEl);
  let best = null;
  for(const w of wraps){
    const rect = w.getBoundingClientRect();
    if(clientY < rect.top || clientY > rect.bottom) continue; // 同じ行にあるものだけ対象
    if(clientX <= rect.right) continue; // カーソルがその要素より右側にある場合のみ
    if(!best || rect.right > best.rect.right) best = { neighbor:w, rect };
  }
  if(!best) return null;
  if(clientX > box.right) return null;
  const leftover = box.right - best.rect.right;
  if(leftover < SIDE_DROP_MIN_GAP) return null;
  return { neighbor: best.neighbor, leftover };
}

function getSideIndicatorEl(){
  if(!sideIndicatorEl){
    sideIndicatorEl = document.createElement('div');
    sideIndicatorEl.className = 'side-drop-indicator';
  }
  return sideIndicatorEl;
}

function showSideIndicator(sideTarget){
  const ind = getSideIndicatorEl();
  const canvasRect = canvas.getBoundingClientRect();
  const rect = sideTarget.neighbor.getBoundingClientRect();
  ind.style.left = (rect.right - canvasRect.left + 4) + 'px';
  ind.style.top = (rect.top - canvasRect.top) + 'px';
  ind.style.height = rect.height + 'px';
  if(!ind.parentNode) canvas.appendChild(ind);
}

function hideSideIndicator(){
  if(sideIndicatorEl && sideIndicatorEl.parentNode){
    sideIndicatorEl.parentNode.removeChild(sideIndicatorEl);
  }
}

canvas.addEventListener('dragover', (e)=>{
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  pageEl.classList.add('drag-over');

  const sideTarget = findSideDropTarget(e.clientX, e.clientY);
  if(sideTarget){
    pendingSideDrop = sideTarget;
    if(dropIndicator && dropIndicator.parentNode){
      dropIndicator.parentNode.removeChild(dropIndicator);
    }
    showSideIndicator(sideTarget);
    return;
  }

  pendingSideDrop = null;
  hideSideIndicator();
  const target = findDropTarget(e.clientY);
  const indicator = getIndicator();
  if(target) canvas.insertBefore(indicator, target);
  else canvas.appendChild(indicator);
});

canvas.addEventListener('dragleave', (e)=>{
  if(e.target === canvas){
    if(dropIndicator && dropIndicator.parentNode){
      dropIndicator.parentNode.removeChild(dropIndicator);
    }
    hideSideIndicator();
    pendingSideDrop = null;
  }
});

canvas.addEventListener('drop', (e)=>{
  e.preventDefault();
  pageEl.classList.remove('drag-over');
  const type = e.dataTransfer.getData('text/plain');

  if(pendingSideDrop && type && templates[type]){
    const neighbor = pendingSideDrop.neighbor;
    hideSideIndicator();
    if(dropIndicator && dropIndicator.parentNode){
      dropIndicator.parentNode.removeChild(dropIndicator);
    }

    const wrap = createBlock(type);
    canvas.insertBefore(wrap, neighbor.nextSibling);

    const box = getCanvasContentBox();
    const neighborRect = neighbor.getBoundingClientRect();
    const widthPx = Math.max(60, box.right - neighborRect.right - 4);
    const widthPct = (widthPx / box.width * 100).toFixed(2);
    wrap.style.width = widthPct + '%';
    wrap.style.marginLeft = '4px';
    wrap.style.maxWidth = 'none';

    /* この2つだけを明示的にinline-blockにして横に並べる。
       他の(何もしていない)パーツはdisplay:blockのままなので、
       幅を縮めても自動でほかのパーツが横に来ることはない。 */
    neighbor.style.display = 'inline-block';
    neighbor.style.verticalAlign = 'top';
    wrap.style.display = 'inline-block';
    wrap.style.verticalAlign = 'top';
    wrap.dataset.sideAttached = 'true';

    selectElement(wrap);
    focusNewContent(wrap, type);
    pushHistory();
    pendingSideDrop = null;
    return;
  }

  pendingSideDrop = null;
  hideSideIndicator();
  const refNode = (dropIndicator && dropIndicator.parentNode) ? dropIndicator.nextElementSibling : null;
  if(dropIndicator && dropIndicator.parentNode){
    dropIndicator.parentNode.removeChild(dropIndicator);
  }
  if(type && templates[type]){
    insertBlockAt(type, refNode);
  }
});

pageEl.addEventListener('mousedown', (e)=>{
  const rightHandle = e.target.closest('.resize-handle.right');
  const leftHandle = e.target.closest('.resize-handle.left');
  const bottomHandle = e.target.closest('.resize-handle.bottom');
  const cornerBRHandle = e.target.closest('.resize-handle.corner.br');
  const cornerBLHandle = e.target.closest('.resize-handle.corner.bl');
  /* パーツの枠(余白)部分を直接つかんだ場合は、上下左右自由に移動・並べ替えができる。
     .content等の中身をクリックした場合はここには来ない(通常のテキスト編集・選択のため)。
     ただし画像・HTML埋め込みのプレビュー・表は文字入力がないため、
     そのもの自体をつかんでも同様にドラッグできるようにする。 */
  let frameWrap = null;
  if(e.target.classList && e.target.classList.contains('element-wrap') && e.target.parentElement === canvas){
    frameWrap = e.target;
  } else {
    const wrapCandidate = e.target.closest('.element-wrap');
    if(wrapCandidate && wrapCandidate.parentElement === canvas){
      if(wrapCandidate.dataset.el === 'image' && e.target.closest('.img-box')){
        frameWrap = wrapCandidate;
      } else if(wrapCandidate.dataset.el === 'embed' && e.target.closest('.embed-preview')){
        frameWrap = wrapCandidate;
      } else if(wrapCandidate.dataset.el === 'table' && e.target.closest('.content')){
        frameWrap = wrapCandidate;
      }
    }
  }

  if(!rightHandle && !leftHandle && !bottomHandle && !cornerBRHandle && !cornerBLHandle && !frameWrap) return;
  e.preventDefault();
  e.stopPropagation();

  const wrap = (rightHandle || leftHandle || bottomHandle || cornerBRHandle || cornerBLHandle || frameWrap).closest('.element-wrap');
  selectElement(wrap);

  const box = getCanvasContentBox();
  const maxWidth = box.width;
  const wrapRect = wrap.getBoundingClientRect();
  const startLeft = wrapRect.left - box.left;
  const startWidth = wrapRect.width;
  const startX = e.clientX;
  const startY = e.clientY;
  const imgBox = wrap.querySelector('.img-box');
  const startHeight = imgBox ? imgBox.getBoundingClientRect().height : 0;
  const aspectRatio = (imgBox && startHeight > 0) ? (startWidth / startHeight) : 1;
  const canReorder = !!frameWrap;
  let pendingSideReorder = null;

  const cursorClass = cornerBRHandle ? 'resizing-nwse' : (cornerBLHandle ? 'resizing-nesw' : (bottomHandle ? 'resizing-y' : (frameWrap ? 'moving-x' : 'resizing-x')));
  document.body.classList.add(cursorClass);

  function setBox(leftPx, widthPx){
    const leftPct = (leftPx / maxWidth * 100).toFixed(2);
    const widthPct = (widthPx / maxWidth * 100).toFixed(2);
    wrap.style.marginLeft = leftPct + '%';
    wrap.style.marginRight = '0';
    wrap.style.width = widthPct + '%';
    wrap.style.maxWidth = 'none';
  }

  function findReorderTarget(clientY){
    const wraps = [...canvas.querySelectorAll(':scope > .element-wrap')].filter(w => w !== wrap);
    for(const w of wraps){
      const rect = w.getBoundingClientRect();
      if(clientY < rect.top + rect.height / 2) return w;
    }
    return null;
  }

  const isSideAttached = wrap.dataset.sideAttached === 'true';

  function setWidthOnly(widthPx){
    const widthPct = (widthPx / maxWidth * 100).toFixed(2);
    wrap.style.width = widthPct + '%';
    wrap.style.maxWidth = 'none';
  }

  function onMove(ev){
    const dx = ev.clientX - startX;
    if(rightHandle){
      let newWidth = startWidth + dx;
      newWidth = Math.max(60, Math.min(newWidth, maxWidth - startLeft));
      /* 横並びの右側パーツは、隣にくっついた状態を保つため左位置(margin-left)は
         変更せず、幅だけを変える。ここでmargin-leftまで書き換えてしまうと、
         幅を変えるたびに位置がずれるバグになっていた。 */
      if(isSideAttached){
        setWidthOnly(newWidth);
      } else {
        setBox(startLeft, newWidth);
      }
    } else if(leftHandle){
      if(isSideAttached){
        let newWidth = startWidth - dx;
        newWidth = Math.max(60, newWidth);
        setWidthOnly(newWidth);
      } else {
        const rightEdge = startLeft + startWidth;
        let newLeft = startLeft + dx;
        newLeft = Math.max(0, Math.min(newLeft, rightEdge - 60));
        setBox(newLeft, rightEdge - newLeft);
      }
    } else if(frameWrap){
      let newLeft = startLeft + dx;
      newLeft = Math.max(0, Math.min(newLeft, maxWidth - startWidth));
      setBox(newLeft, startWidth);

      if(wrap.dataset.el === 'table' && (Math.abs(dx) > 4 || Math.abs(ev.clientY - startY) > 4)){
        tableJustDragged = true;
      }

      if(canReorder){
        const dy = ev.clientY - startY;
        wrap.style.transform = `translateY(${dy}px)`;
        wrap.classList.add('dragging-part');

        const sideTarget = findSideDropTarget(ev.clientX, ev.clientY, wrap);
        if(sideTarget){
          pendingSideReorder = sideTarget;
          if(dropIndicator && dropIndicator.parentNode){
            dropIndicator.parentNode.removeChild(dropIndicator);
          }
          showSideIndicator(sideTarget);
        } else {
          pendingSideReorder = null;
          hideSideIndicator();
          if(Math.abs(dy) > 6){
            const target = findReorderTarget(ev.clientY);
            const indicator = getIndicator();
            if(target){
              canvas.insertBefore(indicator, target);
            } else {
              canvas.appendChild(indicator);
            }
          } else if(dropIndicator && dropIndicator.parentNode){
            dropIndicator.parentNode.removeChild(dropIndicator);
          }
        }
      }
    } else if(bottomHandle && imgBox){
      const dy = ev.clientY - startY;
      let newHeight = startHeight + dy;
      newHeight = Math.max(40, newHeight);
      imgBox.style.height = newHeight + 'px';
    } else if(cornerBRHandle && imgBox){
      let newWidth = startWidth + dx;
      newWidth = Math.max(60, Math.min(newWidth, maxWidth - startLeft));
      setBox(startLeft, newWidth);
      imgBox.style.height = Math.max(40, newWidth / aspectRatio) + 'px';
    } else if(cornerBLHandle && imgBox){
      const rightEdge = startLeft + startWidth;
      let newLeft = startLeft + dx;
      newLeft = Math.max(0, Math.min(newLeft, rightEdge - 60));
      const newWidth = rightEdge - newLeft;
      setBox(newLeft, newWidth);
      imgBox.style.height = Math.max(40, newWidth / aspectRatio) + 'px';
    }
  }
  function onUp(){
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.classList.remove('resizing-x', 'resizing-y', 'moving-x', 'resizing-nwse', 'resizing-nesw');

    if(canReorder){
      wrap.style.transform = '';
      wrap.classList.remove('dragging-part');
      hideSideIndicator();

      if(pendingSideReorder){
        const neighbor = pendingSideReorder.neighbor;
        if(dropIndicator && dropIndicator.parentNode){
          dropIndicator.parentNode.removeChild(dropIndicator);
        }
        canvas.insertBefore(wrap, neighbor.nextSibling);

        const cbox = getCanvasContentBox();
        const neighborRect = neighbor.getBoundingClientRect();
        const availablePx = Math.max(60, cbox.right - neighborRect.right - 4);
        /* 隙間に収まるなら、動かす前の元の幅をできるだけ保つ。
           隙間より元の幅が広い時だけ、隙間に収まるよう縮める。 */
        const widthPx = Math.min(startWidth, availablePx);
        const widthPct = (widthPx / cbox.width * 100).toFixed(2);
        wrap.style.width = widthPct + '%';
        wrap.style.marginLeft = '4px';
        wrap.style.maxWidth = 'none';
        wrap.style.display = 'inline-block';
        wrap.style.verticalAlign = 'top';
        wrap.dataset.sideAttached = 'true';
        neighbor.style.display = 'inline-block';
        neighbor.style.verticalAlign = 'top';
      } else if(dropIndicator && dropIndicator.parentNode){
        dropIndicator.parentNode.insertBefore(wrap, dropIndicator);
        dropIndicator.parentNode.removeChild(dropIndicator);

        /* 横並びだったパーツを、横並びではない普通の場所へ移動した場合は、
           横並び用に設定されていたスタイルを解除して元の縦積み表示に戻す。
           (これをしないと、横並びを解除しようとしても元に戻せなかった) */
        if(wrap.dataset.sideAttached === 'true'){
          delete wrap.dataset.sideAttached;
          wrap.style.removeProperty('display');
          wrap.style.removeProperty('vertical-align');
          wrap.style.removeProperty('width');
          wrap.style.removeProperty('margin-left');
          wrap.style.removeProperty('margin-right');
          wrap.style.removeProperty('max-width');
        }
      }
    }

    pushHistory();
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(confirm('作成中のページをすべて削除します。よろしいですか？')){
    canvas.innerHTML = '';
    selected = null;
    renderStylesPanel();
    pushHistory();
  }
});

  const output = `<!DOCTYPE html>

  const blob = new Blob([output], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (title.trim() || 'site') + '.html';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);

  saveSiteToList(title, output);
});

function saveSiteToList(title, html){
  let list = [];
  try{
    const raw = localStorage.getItem('mySites');
    if(raw) list = JSON.parse(raw);
  }catch(e){ list = []; }

  list.push({
    id: 'site-' + Date.now(),
    title: title,
    savedAt: new Date().toISOString(),
    html: html,
    state: captureSnapshot()
  });

  try{
    localStorage.setItem('mySites', JSON.stringify(list));
  }catch(e){
    console.warn('サイト一覧への保存に失敗しました（保存容量の上限の可能性があります）', e);
  }
}

function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escapeAttr(str){
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* 以前のバージョンで文字の一部にリンクを設定していた場合、公開時にボタンの<a>の中に
   さらに<a>が入れ子になり、HTMLとして不正になってデザインが崩れる原因になっていた。
   念のため、ボタンを書き出すときは中に紛れ込んだaタグを取り除く。 */
/* サイズ・フォントの部分編集時に内部的に使うdata-live-edit目印は、
   公開するHTMLには不要なので書き出し時に取り除く。 */
function stripLiveEditMarkers(html){
  const div = document.createElement('div');
  div.innerHTML = html;
  div.querySelectorAll('[data-live-edit]').forEach(el => el.removeAttribute('data-live-edit'));
  return div.innerHTML;
}

function stripNestedLinks(html){
  const div = document.createElement('div');
  div.innerHTML = html;
  div.querySelectorAll('a').forEach(a=>{
    while(a.firstChild) a.parentNode.insertBefore(a.firstChild, a);
    a.remove();
  });
  return div.innerHTML;
}

function getCleanCanvasHTML(){
  const tagMap = {
    heading: 'h1', subheading: 'h2', paragraph: 'p',
    button: 'a', divider: 'hr', section: 'div', image: 'div'
  };
  const classMap = {
    heading: 'heading-el', subheading: 'subheading-el', paragraph: 'paragraph-el',
    button: 'btn-el', divider: 'divider-el', section: 'section-el', image: 'image-el'
  };

  let out = '';
  canvas.querySelectorAll(':scope > .element-wrap').forEach(wrap=>{
    const type = wrap.dataset.el;
    const wrapStyle = wrap.getAttribute('style') || '';
    const wrapStyleAttr = wrapStyle ? ` style="${wrapStyle}"` : '';

    if(type === 'embed'){
      const codeBox = wrap.querySelector('.embed-code');
      const rawCode = codeBox ? codeBox.value : '';
      out += `<div class="embed-el"${wrapStyleAttr}>\n${rawCode}\n</div>\n`;
      return;
    }

    const content = wrap.querySelector('.content');
    const img = wrap.querySelector('img');
    const inlineStyle = content ? content.getAttribute('style') || '' : '';
    const combinedStyle = [wrapStyle, inlineStyle].filter(Boolean).join(';');
    const styleAttr = combinedStyle ? ` style="${combinedStyle}"` : '';

    if(type === 'image'){
      const imgBox = wrap.querySelector('.img-box');
      out += imgBox ? `<div class="image-el"${wrapStyleAttr}>${imgBox.outerHTML}</div>\n` : '';
    } else if(type === 'divider'){
      out += `<hr class="divider-el"${styleAttr}>\n`;
    } else if(type === 'table'){
      out += `<div class="table-el"${wrapStyleAttr}>${content.innerHTML}</div>\n`;
    } else if(type === 'button'){
      const href = wrap.dataset.href ? escapeAttr(wrap.dataset.href) : '#';
      const safeContent = stripLiveEditMarkers(stripNestedLinks(content.innerHTML));
      out += `<a href="${href}" class="btn-el"${styleAttr}>${safeContent}</a>\n`;
    } else {
      const tag = tagMap[type];
      const cls = classMap[type];
      out += `<${tag} class="${cls}"${styleAttr}>${stripLiveEditMarkers(content.innerHTML)}</${tag}>\n`;
    }
  });
  return out;
}

(function initFromSavedSite(){
  const params = new URLSearchParams(location.search);
  const siteId = params.get('site');

  if(siteId){
    try{
      const raw = localStorage.getItem('mySites');
      const list = raw ? JSON.parse(raw) : [];
      const entry = list.find(s => s.id === siteId);
      if(entry && entry.state){
        restoreSnapshot(entry.state);
      } else if(entry){
        alert('このサイトは以前のバージョンで保存されたため、編集画面では開けません。「プレビュー」または「再ダウンロード」をご利用ください。');
      }
    }catch(e){
      console.warn('サイトの読み込みに失敗しました', e);
    }
  }

  history = [captureSnapshot()];
  historyIndex = 0;
  updateUndoRedoButtons();
})();
