<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作ったサイト一覧</title>
<style>
  :root{
    --shell-bg: #eeeeec;
    --panel-bg: #ffffff;
    --panel-bg-2: #f0f0ed;
    --line: #d6d6d2;
    --text: #0f0f0d;
    --text-dim: #6b6b64;
    --accent: #1642e0;
    --danger: #c8241a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;background:var(--shell-bg);color:var(--text);}
  body{padding:0;}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px;background:var(--panel-bg);border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:.01em;}
  .brand .dot{width:9px;height:9px;border-radius:2px;background:var(--accent);}

  button, .btn{
    font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel-bg-2);
    color:var(--text);border-radius:3px;padding:7px 13px;font-size:13px;
    text-decoration:none;display:inline-block;
  }
  button:hover, .btn:hover{border-color:var(--accent);color:var(--accent);}
  button.primary, .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
  button.primary:hover, .btn.primary:hover{background:#0f2fa8;border-color:#0f2fa8;color:#fff;}
  button.danger:hover{border-color:var(--danger);color:var(--danger);}

  .wrap{max-width:900px;margin:0 auto;padding:32px 24px 80px;}
  .wrap h1{font-size:24px;font-weight:800;letter-spacing:-.01em;margin:0 0 6px;}
  .wrap .lead{color:var(--text-dim);font-size:13px;margin:0 0 28px;}

  .empty{
    border:1px dashed var(--line);border-radius:3px;padding:60px 20px;text-align:center;
    color:var(--text-dim);font-size:14px;background:var(--panel-bg);
  }

  .site-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .site-card{
    background:var(--panel-bg);border:1px solid var(--line);border-radius:3px;
    padding:16px;display:flex;flex-direction:column;gap:10px;
  }
  .site-card h2{font-size:15px;margin:0;word-break:break-word;font-weight:700;}
  .site-card .meta{font-size:12px;color:var(--text-dim);}
  .site-card .actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;padding-top:8px;}
  .site-card .actions button, .site-card .actions .btn{flex:1 1 calc(50% - 3px);text-align:center;min-width:80px;}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#c7c7c2;border-radius:3px;}

  @media (max-width: 640px){
    .topbar{padding:12px 16px;flex-wrap:wrap;gap:10px;}
    .brand{font-size:14px;}
    .wrap{padding:20px 16px 60px;}
    .wrap h1{font-size:20px;}
    .site-grid{grid-template-columns:1fr;gap:12px;}
    .site-card .actions button, .site-card .actions .btn{flex:1 1 100%;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span>作ったサイト一覧</div>
  <a class="btn primary" href="edit.html">＋ 新しいサイトを作る</a>
</div>

<div class="wrap">
  <h1>これまでに作ったサイト</h1>
  <p class="lead">「かんたんサイトビルダー（edit.html）」でHTMLをダウンロードするたびに、このブラウザに一覧として保存されます。※このブラウザ・この端末でのみ表示されます。</p>

  <div id="siteList"></div>
</div>

<script>
function loadSites(){
  let list = [];
  try{
    const raw = localStorage.getItem('mySites');
    if(raw) list = JSON.parse(raw);
  }catch(e){ list = []; }
  return list.slice().reverse();
}

function saveSites(list){
  localStorage.setItem('mySites', JSON.stringify(list.slice().reverse()));
}

function formatDate(iso){
  try{
    const d = new Date(iso);
    return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0')
      + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }catch(e){ return ''; }
}

function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function render(){
  const container = document.getElementById('siteList');
  const sites = loadSites();

  if(sites.length === 0){
    container.innerHTML = `<div class="empty">まだサイトが保存されていません。<br>「かんたんサイトビルダー」でサイトを作ってダウンロードすると、ここに表示されます。</div>`;
    return;
  }

  container.innerHTML = `<div class="site-grid">` + sites.map(site => `
    <div class="site-card" data-id="${escapeHTML(site.id)}">
      <h2>${escapeHTML(site.title || '無題のサイト')}</h2>
      <div class="meta">保存日時: ${formatDate(site.savedAt)}</div>
      <div class="actions">
        <a href="edit.html?site=${encodeURIComponent(site.id)}" class="btn primary open-edit-btn">開く</a>
        <button type="button" class="open-btn">プレビュー</button>
        <button type="button" class="dl-btn">再ダウンロード</button>
        <button type="button" class="del-btn danger">削除</button>
      </div>
    </div>
  `).join('') + `</div>`;

  container.querySelectorAll('.site-card').forEach(card=>{
    const id = card.dataset.id;
    const site = sites.find(s => s.id === id);
    if(!site) return;

    card.querySelector('.open-btn').addEventListener('click', ()=>{
      const blob = new Blob([site.html], {type:'text/html'});
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
    });

    card.querySelector('.dl-btn').addEventListener('click', ()=>{
      const blob = new Blob([site.html], {type:'text/html'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (site.title || 'site') + '.html';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    card.querySelector('.del-btn').addEventListener('click', ()=>{
      if(!confirm('この一覧からサイトを削除します。よろしいですか？（ダウンロード済みのファイルは残ります）')) return;
      const all = loadSites().filter(s => s.id !== id);
      saveSites(all);
      render();
    });
  });
}

render();
</script>

</body>
</html>
