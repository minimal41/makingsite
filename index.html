<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作ったサイト一覧</title>
<style>
  :root{
    --shell-bg: #eeeeec;
    --panel-bg: #ffffff;
    --panel-bg-2: #f0f0ed;
    --line: #d6d6d2;
    --text: #0f0f0d;
    --text-dim: #6b6b64;
    --accent: #1642e0;
    --danger: #c8241a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;background:var(--shell-bg);color:var(--text);}
  body{padding:0;}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px;background:var(--panel-bg);border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:.01em;}
  .brand .dot{width:9px;height:9px;border-radius:2px;background:var(--accent);}

  .auth-bar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    padding:10px 24px;background:var(--panel-bg-2);border-bottom:1px solid var(--line);font-size:13px;
  }
  .auth-status{color:var(--text-dim);}
  .auth-form{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .auth-form input[type=email]{
    font-family:inherit;font-size:13px;padding:6px 9px;border:1px solid var(--line);border-radius:3px;min-width:220px;
  }
  .auth-form input[type=email]:focus{border-color:var(--accent);outline:none;}
  @media (max-width: 640px){
    .auth-bar{padding:10px 16px;}
    .auth-form input[type=email]{min-width:0;flex:1 1 auto;}
  }

  button, .btn{
    font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel-bg-2);
    color:var(--text);border-radius:3px;padding:7px 13px;font-size:13px;
    text-decoration:none;display:inline-block;
  }
  button:hover, .btn:hover{border-color:var(--accent);color:var(--accent);}
  button.primary, .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
  button.primary:hover, .btn.primary:hover{background:#0f2fa8;border-color:#0f2fa8;color:#fff;}
  button.danger:hover{border-color:var(--danger);color:var(--danger);}

  .wrap{max-width:900px;margin:0 auto;padding:32px 24px 80px;}
  .wrap h1{font-size:24px;font-weight:800;letter-spacing:-.01em;margin:0 0 6px;}
  .wrap .lead{color:var(--text-dim);font-size:13px;margin:0 0 28px;}

  .empty{
    border:1px dashed var(--line);border-radius:3px;padding:60px 20px;text-align:center;
    color:var(--text-dim);font-size:14px;background:var(--panel-bg);
  }

  .site-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .site-card{
    background:var(--panel-bg);border:1px solid var(--line);border-radius:3px;
    padding:16px;display:flex;flex-direction:column;gap:10px;
  }
  .site-card h2{font-size:15px;margin:0;word-break:break-word;font-weight:700;}
  .site-card .meta{font-size:12px;color:var(--text-dim);}
  .site-card .actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;padding-top:8px;}
  .site-card .actions button, .site-card .actions .btn{flex:1 1 calc(50% - 3px);text-align:center;min-width:80px;}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#c7c7c2;border-radius:3px;}

  @media (max-width: 640px){
    .topbar{padding:12px 16px;flex-wrap:wrap;gap:10px;}
    .brand{font-size:14px;}
    .wrap{padding:20px 16px 60px;}
    .wrap h1{font-size:20px;}
    .site-grid{grid-template-columns:1fr;gap:12px;}
    .site-card .actions button, .site-card .actions .btn{flex:1 1 100%;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span>作ったサイト一覧</div>
  <a class="btn primary" href="edit.html">＋ 新しいサイトを作る</a>
</div>

<div class="auth-bar" id="authBar">
  <div id="authStatus" class="auth-status">読み込み中…</div>
  <div id="authLoggedOut" class="auth-form" style="display:none;">
    <input type="email" id="authEmail" placeholder="メールアドレス" autocomplete="email">
    <button type="button" id="authSendBtn" class="btn primary">ログインリンクを送る</button>
  </div>
  <div id="authLoggedIn" class="auth-form" style="display:none;">
    <span id="authEmailDisplay"></span>
    <button type="button" id="authLogoutBtn" class="btn">ログアウト</button>
  </div>
</div>

<div class="wrap">
  <h1>これまでに作ったサイト</h1>
  <p class="lead">「サイトメーカー（edit.html）」でHTMLをダウンロードするたびに、このブラウザに一覧として保存されます。※このブラウザ・この端末でのみ表示されます。</p>

  <div id="siteList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ▼▼▼ ここを自分のSupabaseプロジェクトの値に書き換えてください ▼▼▼ */
const SUPABASE_URL = 'https://bhbmhcnabrdsxgaigcks.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoYm1oY25hYnJkc3hnYWlnY2tzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjUwNjQsImV4cCI6MjA5OTIwMTA2NH0.jnFLGtNHWEeXUipUYBW6GID-CoD1o4a9bfQQPfdlX1Y';
/* ▲▲▲ ここまで ▲▲▲ */

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentSession = null;
let cachedSites = [];

/* --- ログイン状態の表示切り替え --- */
function renderAuthUI(session){
  const statusEl = document.getElementById('authStatus');
  const loggedOutEl = document.getElementById('authLoggedOut');
  const loggedInEl = document.getElementById('authLoggedIn');

  statusEl.style.display = 'none';
  if(session){
    loggedOutEl.style.display = 'none';
    loggedInEl.style.display = 'flex';
    document.getElementById('authEmailDisplay').textContent = session.user.email;
  } else {
    loggedInEl.style.display = 'none';
    loggedOutEl.style.display = 'flex';
  }
}

document.getElementById('authSendBtn').addEventListener('click', async ()=>{
  const email = document.getElementById('authEmail').value.trim();
  if(!email){ alert('メールアドレスを入力してください'); return; }
  const { error } = await supabaseClient.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href }
  });
  if(error){
    alert('ログインリンクの送信に失敗しました: ' + error.message);
  } else {
    alert('ログイン用のリンクをメールに送信しました。メール内のリンクを開いてください。');
  }
});

document.getElementById('authLogoutBtn').addEventListener('click', async ()=>{
  await supabaseClient.auth.signOut();
});

supabaseClient.auth.onAuthStateChange((_event, session)=>{
  currentSession = session;
  renderAuthUI(session);
  render();
});

/* --- サイト一覧の読み込み（Supabaseから） --- */
async function loadSites(){
  if(!currentSession){
    cachedSites = [];
    return [];
  }
  const { data, error } = await supabaseClient
    .from('sites')
    .select('id, title, html, state, created_at')
    .order('created_at', { ascending: false });

  if(error){
    console.warn('サイト一覧の読み込みに失敗しました', error);
    cachedSites = [];
    return [];
  }
  cachedSites = data || [];
  return cachedSites;
}

function formatDate(iso){
  try{
    const d = new Date(iso);
    if(isNaN(d.getTime())) return '';
    return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0')
      + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }catch(e){ return ''; }
}

function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function render(){
  const container = document.getElementById('siteList');

  if(!currentSession){
    container.innerHTML = `<div class="empty">ログインすると、これまでに保存したサイトの一覧が表示されます。<br>上のログインバーからメールアドレスを入力してください。</div>`;
    return;
  }

  container.innerHTML = `<div class="empty">読み込み中…</div>`;
  const sites = await loadSites();

  if(sites.length === 0){
    container.innerHTML = `<div class="empty">まだサイトが保存されていません。<br>「サイトメーカー」でサイトを作ってダウンロードすると、ここに表示されます。</div>`;
    return;
  }

  container.innerHTML = `<div class="site-grid">` + sites.map(site => `
    <div class="site-card" data-id="${escapeHTML(site.id)}">
      <h2>${escapeHTML(site.title || '無題のサイト')}${site.html ? '' : ' <span style="font-size:11px;font-weight:400;color:var(--text-dim);border:1px solid var(--line);border-radius:2px;padding:1px 6px;">下書き</span>'}</h2>
      <div class="meta">保存日時: ${formatDate(site.created_at)}</div>
      <div class="actions">
        <a href="edit.html?site=${encodeURIComponent(site.id)}" class="btn primary open-edit-btn">開く</a>
        <button type="button" class="open-btn" ${site.html ? '' : 'disabled title="まだダウンロードされていません。編集画面で「HTMLをダウンロード」を行うと利用できます。"'}>プレビュー</button>
        <button type="button" class="dl-btn" ${site.html ? '' : 'disabled title="まだダウンロードされていません。編集画面で「HTMLをダウンロード」を行うと利用できます。"'}>再ダウンロード</button>
        <button type="button" class="del-btn danger">削除</button>
      </div>
    </div>
  `).join('') + `</div>`;

  container.querySelectorAll('.site-card').forEach(card=>{
    const id = card.dataset.id;
    const site = cachedSites.find(s => s.id === id);
    if(!site) return;

    if(site.html){
      card.querySelector('.open-btn').addEventListener('click', ()=>{
        const blob = new Blob([site.html], {type:'text/html'});
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
      });

      card.querySelector('.dl-btn').addEventListener('click', ()=>{
        const blob = new Blob([site.html], {type:'text/html'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (site.title || 'site') + '.html';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      });
    }

    card.querySelector('.del-btn').addEventListener('click', async ()=>{
      if(!confirm('この一覧からサイトを削除します。よろしいですか？（ダウンロード済みのファイルは残ります）')) return;
      const { error } = await supabaseClient.from('sites').delete().eq('id', id);
      if(error){
        alert('削除に失敗しました: ' + error.message);
        return;
      }
      render();
    });
  });
}
</script>

</body>
</html>
